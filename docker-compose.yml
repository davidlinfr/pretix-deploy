services:
  pretix:
    build: .
    image: fyneo/pretix:stable
    restart: unless-stopped
    environment:
      PRETIX_INSTANCE_NAME: "Fyneo Billetterie"
      PRETIX_PRETIX_URL: https://tickets.fyneo.org
      PRETIX_PRETIX_CURRENCY: EUR
      PRETIX_DB_BACKEND: postgresql
      PRETIX_DB_NAME: ${POSTGRES_DB}
      PRETIX_DB_USER: ${POSTGRES_USER}
      PRETIX_DB_PASS: ${POSTGRES_PASSWORD}
      PRETIX_DB_HOST: db
      PRETIX_DB_PORT: 5432
      PRETIX_REDIS_LOCATION: redis://redis:6379/0
      PRETIX_REDIS_SESSIONS: "True"
      PRETIX_CELERY_BACKEND: redis://redis:6379/1
      PRETIX_CELERY_BROKER: redis://redis:6379/2
      PRETIX_MAIL_FROM: bonjour@fyneo.org
      PRETIX_MAIL_HOST: ${SMTP_HOST}
      PRETIX_MAIL_PORT: ${SMTP_PORT:-587}
      PRETIX_MAIL_USER: ${SMTP_USER}
      PRETIX_MAIL_PASSWORD: ${SMTP_PASSWORD}
      PRETIX_MAIL_TLS: "True"
      PRETIX_MAIL_SSL: "False"
      PRETIX_LANGUAGES_DEFAULT: fr
      PRETIX_LANGUAGES: "fr,en"
      PRETIX_DJANGO_SECRET: ${DJANGO_SECRET}
      PRETIX_TRUST_X_FORWARDED_FOR: "True"
      PRETIX_TRUST_X_FORWARDED_PROTO: "True"
    volumes:
      - pretix_data:/data
    depends_on:
      - db
      - redis
    expose:
      - "80"
    networks:
      - pretix_net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pretix_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - pretix_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pretix_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  pretix_net:
    driver: bridge
